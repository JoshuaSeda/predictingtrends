<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="icon" type="image/svg+xml" href="https://cdn-icons-png.flaticon.com/512/545/545546.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- RESET & VARIABLES --- */
        :root {
            --color-text-main: #F7FAFC;
            --color-text-muted: #A0AEC0;
            --color-input-bg: rgba(45, 55, 72, 0.6); /* Semi-transparent inputs */
            --color-input-border: #4A5568;
            --color-accent: #FFFFFF;
            --color-danger: #FC8181;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--color-text-main);
            
            /* BACKGROUND IMAGE WITH FADED BLACK OVERLAY */
            /* Replace the URL below with: "{{ url_for('static', filename='your-bg-image.png') }}" */
            background: 
                linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)),
                url("{{ url_for('static', filename='test.gif') }}") no-repeat center center/cover;
        }

        /* --- GLASS CARD STYLES --- */
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            
            /* Glassmorphism Effect */
            background-color: rgba(26, 32, 44, 0.65); /* Dark see-through bg */
            backdrop-filter: blur(12px);               /* Blurs the image behind */
            -webkit-backdrop-filter: blur(12px);       /* Safari support */
            
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1); /* Subtle border highlight */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-container h2 {
            font-size: 1.8em;
            font-weight: 700;
            margin: 0 0 10px 0;
            text-align: center;
            letter-spacing: -0.5px;
        }
        
        .subtitle {
            text-align: center;
            color: var(--color-text-muted);
            font-size: 0.9em;
            margin-bottom: 35px;
        }

        /* --- FORM GROUPS --- */
        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85em;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--color-text-muted);
            transition: color 0.3s;
        }

        /* Wrapper to position the eye icon */
        .input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--color-input-border);
            border-radius: 8px;
            background-color: var(--color-input-bg);
            color: white;
            font-size: 1em;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            background-color: rgba(45, 55, 72, 0.9);
            border-color: var(--color-text-muted);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
        }

        /* Input Label Highlight on Focus (via sibling selector) */
        .form-group:focus-within label {
            color: var(--color-accent);
        }

        /* --- PASSWORD TOGGLE ICON --- */
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--color-text-muted);
            background: none;
            border: none;
            padding: 0;
            display: flex;
            align-items: center;
        }
        .toggle-password:hover {
            color: white;
        }

        /* --- BUTTON STYLES --- */
        .btn-login {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background-color: var(--color-accent);
            color: #000;
            font-weight: 700;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
        }

        .btn-login:hover {
            background-color: #E2E8F0;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.15);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        /* Loading State for Button */
        .btn-login:disabled {
            background-color: #718096;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* --- ERROR MESSAGE --- */
        .error-message {
            background-color: rgba(252, 129, 129, 0.15);
            border: 1px solid var(--color-danger);
            color: var(--color-danger);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 0.9em;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

    </style>
</head>
<body>

    <div class="login-container">
        <h2>AmateurxCo</h2>
        <p class="subtitle">Please enter your credentials to continue.</p>

        {% if error %}
            <div class="error-message">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <input type="text" id="username" name="username" placeholder="admin" required autocomplete="off">
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                    <button type="button" class="toggle-password" id="toggleBtn" title="Show Password">
                        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        <svg id="eyeOffIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                    </button>
                </div>
            </div>
            
            <button type="submit" class="btn-login" id="loginBtn">Log In</button>
        </form>
    </div>

    <script>
        // 1. Password Toggle Logic
        const toggleBtn = document.getElementById('toggleBtn');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');
        const eyeOffIcon = document.getElementById('eyeOffIcon');

        toggleBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Toggle Icons
            if (type === 'text') {
                eyeIcon.style.display = 'none';
                eyeOffIcon.style.display = 'block';
            } else {
                eyeIcon.style.display = 'block';
                eyeOffIcon.style.display = 'none';
            }
        });

        // 2. Form Loading State Logic
        const form = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');

        form.addEventListener('submit', (e) => {
            // Don't preventDefault, let the form submit to Flask
            // Just update the UI immediately
            if (form.checkValidity()) {
                loginBtn.disabled = true;
                loginBtn.innerText = 'Authenticating...';
                loginBtn.style.opacity = '0.7';
            }
        });
    </script>

</body>
</html>
